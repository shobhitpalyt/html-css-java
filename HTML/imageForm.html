<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/upload-endpoint" method="POST" enctype="multipart/form-data">
  <label for="imageUpload">Choose an image to upload:</label>
  <br><br>
  <input 
    type="file" 
    id="imageUpload" 
    name="userImage" 
    accept="image/png, image/jpeg, image/webp" 
    required
  />
  <br><br>
  <button type="submit">Submit Image</button>
</form>






<script>
    <form action="/upload-endpoint" method="POST" enctype="multipart/form-data">
  <label for="imageUpload">Choose an image to upload:</label>
  
  <input 
    type="file" 
    id="imageUpload" 
    name="userImage" 
    accept="image/png, image/jpeg, image/webp" 
    required
  />

  <button type="submit">Submit Image</button>
</form>
</script>
</body>
</html>
